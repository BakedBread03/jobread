<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Load Time</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
</head>
<body>

  <h1>Hello, world! This page is being tested for load time.</h1>

  <img src="https://via.placeholder.com/1500x1000" alt="Large Image 1">
  <img src="https://via.placeholder.com/1500x1000" alt="Large Image 2">
  <img src="https://via.placeholder.com/1500x1000" alt="Large Image 3">

  <video width="320" height="240" controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <script>
    // Heavy processing to delay the page load
    for (let i = 0; i < 1000000; i++) {
      Math.sqrt(i);
    }
  </script>

  <footer>
    Design and code © 2024–<span id="year"></span> John M. Brenner &bull; 
    Made with HTML, CSS, and enhanced with JavaScript. Hosted on GitHub Pages.<br>
    This page loaded in <span id="load-time">...</span> seconds.
  </footer>

  <script>
    // Set current year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Use performance.timing for accurate load time
    window.addEventListener('load', () => {
      setTimeout(() => {
        const timing = window.performance.timing;
        const pageLoadTime = (timing.loadEventEnd - timing.navigationStart) / 1000;
        document.getElementById('load-time').textContent = pageLoadTime.toFixed(3);
      }, 500); // Delay to ensure all resources are accounted for
    });
  </script>

</body>
</html
